providers = ["python"]

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"

[phases.install]
cmds = [
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install --no-cache-dir -r backend/requirements.txt",
]

[start]
cmd = "cd backend && /app/.venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
